apiVersion: apps/v1
kind: Deployment
metadata:
  name: synergychat-api
  labels:
    app: synergychat-api # used to select the pods that this deployment manages
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synergychat-api
  template:
    metadata:
      labels:
        app: synergychat-api
    spec:
      containers: # list of containers that will be deployed
      - name: synergychat-api
        image: bootdotdev/synergychat-api:latest
        env:
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: synergychat-api-configmap
              key: API_PORT
        - name: API_DB_FILEPATH
          valueFrom:
            configMapKeyRef:
              name: synergychat-api-configmap
              key: API_DB_FILEPATH
        volumeMounts:
        - name: synergychat-api-volume
          mountPath: /persist
      volumes:
      - name: synergychat-api-volume
        persistentVolumeClaim:
          claimName: synergychat-api-pvc
